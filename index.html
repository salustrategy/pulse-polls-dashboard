const MESES = ["", "jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];

function fmtDate(iso) {
  if (!iso) return "—";
  const parts = iso.split("-");
  if (parts.length === 3) {
    const [y, m, d] = parts;
    return `${d}/${m}/${y.slice(2)}`;
  }
  if (parts.length === 2) {
    const [y, m] = parts;
    return `${MESES[parseInt(m, 10)]}/${y.slice(2)}`;
  }
  return iso;
}

function scopeLabel(p) {
  if (p.abrangencia === "Estadual") return `Estadual · ${p.uf || "?"}`;
  if (p.abrangencia === "Municipal") return `Municipal · ${p.municipio || ""}${p.uf ? " / " + p.uf : ""}`;
  return "Nacional";
}

function monthKey(iso) {
  return iso ? iso.slice(0, 7) : "0000-00";
}

function monthLabel(key) {
  const [y, m] = key.split("-");
  const idx = parseInt(m, 10);
  return `${MESES[idx] || m} ${y}`;
}

const institutos = [...new Set(DATA.pesquisas.map(p => p.instituto))];
const mesesDisponiveis = [...new Set(DATA.pesquisas.map(p => monthKey(p.data_publicacao)))].sort().reverse();
const abrangencias = ["Nacional", "Estadual", "Municipal"].filter(a => DATA.pesquisas.some(p => p.abrangencia === a));
const ufsDisponiveis = [...new Set(DATA.pesquisas.map(p => p.uf).filter(Boolean))].sort();

let activeFilters = new Set(institutos);
let activeMeses = new Set(mesesDisponiveis);
let activeAbrangencias = new Set(abrangencias);
let selectedUF = "";

function renderStats() {
  const row = document.getElementById("statsRow");
  const total = DATA.pesquisas.length;
  const counts = {};
  institutos.forEach(i => counts[i] = 0);
  DATA.pesquisas.forEach(p => counts[p.instituto]++);

  const cssVar = {
    "Atlas Intel": "--i-atlas",
    "Paraná Pesquisas": "--i-parana",
    "IPSOS IPEC": "--i-ipsos",
    "Genial Quaest": "--i-quaest",
  };

  let html = `<div class="stat-tile"><div class="num">${total}</div><div class="label">Total de pesquisas</div></div>`;
  institutos.forEach(inst => {
    const v = cssVar[inst] || "--accent";
    html += `<div class="stat-tile" style="--stripe: var(${v})"><div class="num">${counts[inst]}</div><div class="label">${inst}</div></div>`;
  });
  row.innerHTML = html;
}

function renderFilters() {
  const instGroup = document.getElementById("filterInstituto");
  institutos.forEach(inst => {
    const btn = document.createElement("button");
    btn.className = "chip active";
    btn.dataset.inst = inst;
    btn.textContent = inst;
    btn.addEventListener("click", () => {
      if (activeFilters.has(inst)) {
        activeFilters.delete(inst);
        btn.classList.remove("active");
      } else {
        activeFilters.add(inst);
        btn.classList.add("active");
      }
      renderFeed();
    });
    instGroup.appendChild(btn);
  });

  const mesGroup = document.getElementById("filterMes");
  mesesDisponiveis.forEach(key => {
    const btn = document.createElement("button");
    btn.className = "chip active";
    btn.textContent = monthLabel(key);
    btn.addEventListener("click", () => {
      if (activeMeses.has(key)) {
        activeMeses.delete(key);
        btn.classList.remove("active");
      } else {
        activeMeses.add(key);
        btn.classList.add("active");
      }
      renderFeed();
    });
    mesGroup.appendChild(btn);
  });

  const abrGroup = document.getElementById("filterAbrangencia");
  abrangencias.forEach(ab => {
    const btn = document.createElement("button");
    btn.className = "chip active";
    btn.textContent = ab;
    btn.addEventListener("click", () => {
      if (activeAbrangencias.has(ab)) {
        activeAbrangencias.delete(ab);
        btn.classList.remove("active");
      } else {
        activeAbrangencias.add(ab);
        btn.classList.add("active");
      }
      renderFeed();
    });
    abrGroup.appendChild(btn);
  });

  const ufSelect = document.getElementById("filterUF");
  ufsDisponiveis.forEach(uf => {
    const opt = document.createElement("option");
    opt.value = uf;
    opt.textContent = uf;
    ufSelect.appendChild(opt);
  });
  ufSelect.addEventListener("change", () => {
    selectedUF = ufSelect.value;
    renderFeed();
  });

  document.getElementById("clearFilters").addEventListener("click", () => {
    activeFilters = new Set(institutos);
    activeMeses = new Set(mesesDisponiveis);
    activeAbrangencias = new Set(abrangencias);
    selectedUF = "";
    ufSelect.value = "";
    document.querySelectorAll(".chip").forEach(c => c.classList.add("active"));
    renderFeed();
  });
}

function renderFeed() {
  const feed = document.getElementById("feed");
  const filtered = DATA.pesquisas.filter(p =>
    activeFilters.has(p.instituto) &&
    activeMeses.has(monthKey(p.data_publicacao)) &&
    activeAbrangencias.has(p.abrangencia) &&
    (!selectedUF || p.uf === selectedUF)
  );

  document.getElementById("totalFoot").textContent = `${filtered.length} de ${DATA.pesquisas.length} exibidas`;

  if (filtered.length === 0) {
    feed.innerHTML = `<div class="empty-state">Nenhuma pesquisa para os filtros selecionados.</div>`;
    return;
  }

  const groups = {};
  filtered.forEach(p => {
    const k = monthKey(p.data_publicacao);
    if (!groups[k]) groups[k] = [];
    groups[k].push(p);
  });

  const sortedKeys = Object.keys(groups).sort().reverse();

  let html = "";
  sortedKeys.forEach(key => {
    const items = groups[key].sort((a, b) => (b.data_publicacao || "").localeCompare(a.data_publicacao || ""));
    html += `<div class="month-group">`;
    html += `<div class="month-heading">${monthLabel(key)} <span class="count">${items.length} pesquisa${items.length > 1 ? "s" : ""}</span></div>`;
    items.forEach(p => {
      html += `<article class="poll-card" data-inst="${p.instituto}">`;
      html += `<div class="poll-top">`;
      html += `<div class="badges">`;
      html += `<span class="badge-inst">${p.instituto}</span>`;
      html += `<span class="badge-scope">${scopeLabel(p)}</span>`;
      html += `</div>`;
      html += `<span class="poll-date">${fmtDate(p.data_publicacao)}</span>`;
      html += `</div>`;
      html += `<div class="poll-title">${p.titulo}</div>`;
      html += `<div class="poll-tema">${p.tema}</div>`;
      html += `<div class="poll-resumo">${p.resumo || ""}</div>`;
      html += `<div class="poll-links">`;
      if (p.link_publicacao) html += `<a href="${p.link_publicacao}" target="_blank" rel="noopener">Página da pesquisa →</a>`;
      if (p.link_relatorio && p.link_relatorio !== p.link_publicacao) html += `<a href="${p.link_relatorio}" target="_blank" rel="noopener">Relatório (PDF) →</a>`;
      if (!p.link_publicacao && !p.link_relatorio) html += `<span class="na">Sem link confirmado</span>`;
      html += `</div>`;
      html += `</article>`;
    });
    html += `</div>`;
  });
  feed.innerHTML = html;
}

document.getElementById("lastSync").textContent = new Date(DATA.last_sync).toLocaleString("pt-BR", { dateStyle: "short", timeStyle: "short" });

renderStats();
renderFilters();
renderFeed();
</script>
